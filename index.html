<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <div class="search-section">
        <div class="search-box">
            <input type="text" id="cityInput" class="input-box" placeholder="e.g., Tokyo, London, Paris" autocomplete="off">
            <button id="searchBtn" aria-label="Search"><i class="fas fa-search"></i></button>
        </div>
        <div class="geo-btn" id="geoLocationBtn" aria-label="Use my current location">
            <i class="fas fa-location-dot"></i>
        </div>
    </div>

    <!-- error / not found section (modern) -->
    <div class="location-not-found" id="locationNotFound">
        <i class="fas fa-map-marked-alt"></i>
        <h3>Location not found</h3>
        <p>Try another city or check your spelling</p>
    </div>

    <!-- weather main display -->
    <div class="weather-body" id="weatherBody">
        <img src="https://openweathermap.org/img/wn/10d@4x.png" alt="weather icon" class="weather-icon" id="weatherIcon">
        <div class="city-country" id="cityName">--</div>
        <div class="weather-box">
            <div class="temperature" id="tempValue">--<sup>°C</sup></div>
            <div class="description" id="descText">pleasant climate</div>
            <div class="feels-like" id="feelsLike">🌡️ Feels like --°C</div>
        </div>
        <div class="weather-details">
            <div class="humidity">
                <i class="fas fa-tint"></i>
                <div class="text">
                    <span id="humidityVal">--%</span>
                    <p>Humidity</p>
                </div>
            </div>
            <div class="wind">
                <i class="fas fa-wind"></i>
                <div class="text">
                    <span id="windVal">-- km/h</span>
                    <p>Wind speed</p>
                </div>
            </div>
        </div>
    </div>
    <div class="attribution">
        <i class="fas fa-cloud-sun"></i> Real‑time weather • OpenWeather
    </div>
</div>

    <script src="logic.js"></script>
    <script src="https://kit.fontawesome.com/595a890311.js" crossorigin="anonymous"></script>
</body>
</html>
